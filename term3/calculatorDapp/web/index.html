<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Calculator DApp</title>
    <meta name="description" content="A decentralized calculator application using Web3.js">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
</head>
<body>
    <div class="calculator">
        <h2>Web3 Calculator</h2>
        <div class="input-group">
            <input type="number" id="num1" placeholder="First Number" aria-label="First Number">
            <input type="number" id="num2" placeholder="Second Number" aria-label="Second Number">
        </div>
        <div class="buttons">
            <button id="btnAdd" onclick="calculate('add')" aria-label="Add">+</button>
            <button id="btnSub" onclick="calculate('subtract')" aria-label="Subtract">-</button>
            <button id="btnMul" onclick="calculate('multiply')" aria-label="Multiply">*</button>
            <button id="btnDiv" onclick="calculate('divide')" aria-label="Divide">/</button>
        </div>
        <div class="result-box">
            <span>Result: </span>
            <span id="result">0</span>
        </div>
        <div id="status" class="status">Please connect to MetaMask</div>
        <button id="connectWallet">Connect Wallet</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
